<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <title>DataDrag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="palette">
    <h2>Blocks</h2>
  </div>
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#555"/>
      </marker>
    </defs>
  </svg>
  <div id="ctx-menu" class="hidden"></div>

  <!-- Show-block popup modal -->
  <div id="show-modal" class="hidden">
    <div id="show-overlay"></div>
    <div id="show-content">
      <div id="show-header">
        <h3 id="show-title"></h3>
        <button id="show-close" aria-label="Close">✕</button>
      </div>
      <div id="show-body"></div>
    </div>
  </div>

  <!-- Import map: resolves bare specifiers used by arquero's ESM source. -->
  <!-- node: stubs are placeholders; arquero's file-loading code paths   -->
  <!-- are never reached because we feed CSV text directly from the       -->
  <!-- browser File API.                                                  -->
  <script type="importmap">
  {
    "imports": {
      "acorn":             "/node_modules/acorn/dist/acorn.mjs",
      "@uwdata/flechette": "/node_modules/@uwdata/flechette/dist/flechette.mjs",
      "node:fs/promises":  "/src/stubs/node-fs-stub.js",
      "node:stream":       "/src/stubs/node-stream-stub.js"
    }
  }
  </script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
